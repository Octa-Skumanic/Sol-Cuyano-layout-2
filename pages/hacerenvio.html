<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacer envío - Transporte Sol Cuyano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <header>
        <div class="navbar">
            <h1 class="logo">El Sol Cuyano</h1>
            <nav class="nav-principal">
                <a href="../index.html">Inicio</a>
                <a href="seguirenvio.html">Seguir envío</a>
                <a href="#">Hacer envío</a>
                <a href="contacto.html">Asistencia</a>
                <a href="quienessomos.html">Acerca de nosotros</a>
            </nav>
        </div>
        <h2>Cotizar envío</h2>
    </header>

    <main>
        <section class="seccion">
            <article class="tarjeta tarjeta-envio">
                <div class="tarjeta-media">
                    <figure>
                        <img src="../imagenes/Caja_Sol_Cuyano.jpeg" alt="Caja de Sol Cuyano para el transporte de envíos">
                    </figure>
                </div>
                <div class="tarjeta-info">
                    <h3>Cotizá y enviá tu paquete</h3>
                    <form class="formulario">
                        <label for="form-desde">Desde</label>
                        <input type="text" id="form-desde" placeholder="CP o Localidad">
                        <label for="form-hasta">Hasta</label>
                        <input type="text" id="form-hasta" placeholder="CP o Localidad">
                    </form>
                    <h3>Medidas del paquete</h3>
                    <form class="formulario">
                        <label for="form-alto">Alto</label>
                        <input type="text" id="form-alto" placeholder="Alto cm">
                        <label for="form-ancho">Ancho</label>
                        <input type="text" id="form-ancho" placeholder="Ancho cm">
                        <label for="form-largo">Largo</label>
                        <input type="text" id="form-largo" placeholder="Largo cm">
                        <label for="form-peso">Peso</label>
                        <input type="text" id="form-peso" placeholder="Peso gr">
                    </form>
                    <a href="#" class="enlace-ayuda">Cotizá otro servicio (pallet, cargas generales)</a>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <article>
            <h3>Redes Sociales</h3>
            <ul>
                <li>Facebook</li>
                <li>Instagram</li>
                <li>X</li>
            </ul>
        </article>

        <article>
            <p>Sitio hecho por Octavio - 2026</p>
        </article>
    </footer>
</body>
</html>
